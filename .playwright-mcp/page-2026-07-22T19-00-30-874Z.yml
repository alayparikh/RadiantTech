          - listitem [ref=f20e61]: SCADA, HMI, Commissioning
        - paragraph [ref=f20e62]: Throughout his career TJ has worked on a vast array of projects — US government projects, power plants, airport baggage handling, food-process conveyors, aggregate, and wastewater lift stations. He ran a control-engineering consulting company from 2012 to 2013, working with automotive companies including Tesla, Volkswagen, and Ford, and developed a packing-process control system and a sand-drying control system.
