          - paragraph [ref=f26e57]: Aditya Birla · Dalton, GA
          - paragraph [ref=f26e61]: "Electrical engineering and electrical drawings for the Aditya Birla plant in Dalton, GA. The overall program spans four phases: (1) prepare drawings for the existing electrical systems on the North side of the plant, (2) supply the required parts, (3) develop field wiring drawings for the new layout — consolidating all electrical equipment into a single electrical house, and (4) perform the electrical installation. Radiant is currently delivering Phase 1 (Electrical Engineering); proposals for the remaining phases follow on completion."
          - heading "Scope of services (Phase 1)" [level=4] [ref=f26e62]
