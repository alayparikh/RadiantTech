      - heading "Lift Station Controls" [level=1] [ref=f9e42]
      - paragraph [ref=f9e43]: Reliable lift station and pump control for safe, sanitary operation.
    - generic [ref=f9e46]:
      - generic [ref=f9e47]: Industries · Wastewater
      - heading "Reliable lift station and pump control for safe, sanitary operation." [level=2] [ref=f9e48]
      - paragraph [ref=f9e49]: Wastewater systems depend heavily on reliable lift station operation, including pump control. Radiant devices and level sensors deliver consistent performance you can count on.
    - generic [ref=f9e52]:
      - generic [ref=f9e54]:
        - img "Radiant clarifier drive and control box at a wastewater treatment plant" [ref=f9e56]
        - generic [ref=f9e57]:
          - heading "Our industrial I/O controllers and data acquisition modules are used for" [level=2] [ref=f9e58]
          - list [ref=f9e60]:
            - listitem [ref=f9e61]: Level measurement
            - listitem [ref=f9e62]: VFD control
            - listitem [ref=f9e63]: Hour metering
            - listitem [ref=f9e64]: Remote data acquisition
            - listitem [ref=f9e65]: Pump control
            - listitem [ref=f9e66]: Pump condition monitoring
            - listitem [ref=f9e67]: Pump alternating
            - listitem [ref=f9e68]: Local and remote alarms
      - generic [ref=f9e70]:
        - img "Wastewater clarifier bridge with telemetry antenna and control panel" [ref=f9e72]
        - generic [ref=f9e73]:
          - heading "Lead-lag pump control can be facilitated" [level=2] [ref=f9e74]
          - paragraph [ref=f9e76]: With one or two I/O modules, Radiant Control Systems lets you do all of the above at the cost of hundreds, not thousands. Lead-lag pump control is facilitated with pump alternating logic, run-time data logging, and remote alarms that notify operators of fault conditions — no matter the pump station size (duplex, triplex, or quadplex). Our flexible I/O devices improve your control system and give access to more control at lower budgets.
      - generic [ref=f9e78]:
        - img "Aerial view of a municipal wastewater treatment plant" [ref=f9e80]
        - generic [ref=f9e81]:
          - heading "Sanitary Sewage Overflow (SSO)" [level=2] [ref=f9e82]
          - paragraph [ref=f9e84]: "Carefully monitoring the lift station is key to proper pump maintenance and seamless operation. Failure to do so can result in a Sanitary Sewage Overflow (SSO). SSOs are dangerous and expensive: hiring a pump truck to bypass the station while it is repaired is costly, EPA fines can be exorbitant, and the natural and human environment is compromised."
      - generic [ref=f9e86]:
        - img "Wastewater lift-station control equipment" [ref=f9e88]
        - generic [ref=f9e89]:
          - heading "A logic builder for a tailor-made solution" [level=2] [ref=f9e90]
          - paragraph [ref=f9e92]: Our comprehensive suite of products allows engineers and control system integrators to mix and match I/O with an intelligent custom logic builder for a tailor-made, budget-friendly lift station pump controller.
